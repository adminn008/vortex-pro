<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Fullscreen - Vortex Chronos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fullscreen-bg">
        <header class="site-brand">VORTEX CHRONOS</header>

        <main class="clock-content">
            <div id="date" class="date-text"></div>

            <div class="main-clock">
                <span id="hour">00</span>
                <span class="separator">:</span>
                <span id="minute">00</span>
                <span class="seconds" id="second">00</span>
            </div>

            <div id="location" class="location-text">Detectando sua cidade...</div>
        </main>
        
        <button class="fs-button" onclick="toggleFS()">Tela Cheia</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
