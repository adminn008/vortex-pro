<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVertex | Cinema Unlimited</title>
    <style>
        :root { --primary: #ff0000; --bg: #0a0a0a; --card: #1a1a1a; --text: #eee; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }

        /* Header e Busca */
        header { 
            background: rgba(0,0,0,0.9); padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--primary);
        }
        h1 { color: var(--primary); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        
        #busca { 
            background: #222; border: 1px solid #444; color: white; 
            padding: 10px 15px; border-radius: 5px; width: 250px; outline: none;
        }

        /* Filtros */
        .filtros { padding: 20px 5%; display: flex; gap: 10px; overflow-x: auto; }
        .filter-btn { 
            background: var(--card); border: 1px solid #333; color: white; 
            padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn:hover, .active { background: var(--primary); border-color: var(--primary); }

        /* Grid de Filmes */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; padding: 0 5%; 
        }

        .movie-card { 
            background: var(--card); border-radius: 8px; overflow: hidden; 
            transition: 0.4s; cursor: pointer; border: 1px solid transparent;
            animation: subir 0.5s ease;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .info { padding: 12px; }
        .info h3 { margin: 0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 0.75rem; color: #888; height: 35px; overflow: hidden; margin: 8px 0; }

        /* Modal Player */
        #modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-box { width: 90%; max-width: 850px; position: relative; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 2px solid var(--primary); display: none; }
        
        .ad-gate { text-align: center; padding: 40px; border: 1px dashed var(--primary); }
        .btn-unlock { 
            background: var(--primary); color: white; padding: 15px 30px; 
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        @keyframes subir { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>CINEVERTEX</h1>
    <input type="text" id="busca" placeholder="O que vamos assistir?" onkeyup="filtrar()">
</header>

<div class="filtros" id="generos">
    <button class="filter-btn active" onclick="setFiltro('Todos')">Todos</button>
    <button class="filter-btn" onclick="setFiltro('Terror')">Terror</button>
    <button class="filter-btn" onclick="setFiltro('Ficção Científica')">Ficção</button>
    <button class="filter-btn" onclick="setFiltro('Suspense')">Suspense</button>
</div>

<div class="grid" id="movie-grid"></div>

<div id="modal">
    <div class="modal-box">
        <span onclick="fechar()" style="position:absolute; top:-40px; right:0; cursor:pointer; font-size:35px">×</span>
        
        <div id="ad-area" class="ad-gate">
            <h2>🔒 CONTEÚDO PROTEGIDO</h2>
            <p>Clique abaixo para liberar o acesso ao filme em HD.</p>
            <button class="btn-unlock" onclick="liberar()">LIBERAR AGORA</button>
        </div>

        <iframe id="video" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    let todosFilmes = [];
    let filtroAtual = 'Todos';

    // Carrega o JSON
    fetch('filmes.json')
        .then(res => res.json())
        .then(data => {
            todosFilmes = data;
            render(todosFilmes);
        });

    function render(lista) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = lista.map(f => `
            <div class="movie-card" onclick="abrir('${f.video}')">
                <img src="${f.poster}" alt="${f.titulo}">
                <div class="info">
                    <h3>${f.titulo}</h3>
                    <p>${f.sinopse}</p>
                    <small>${f.ano} • ${f.genero}</small>
                </div>
            </div>
        `).join('');
    }

    function filtrar() {
        const termo = document.getElementById('busca').value.toLowerCase();
        const resultado = todosFilmes.filter(f => 
            (f.titulo.toLowerCase().includes(termo)) && 
            (filtroAtual === 'Todos' || f.genero === filtroAtual)
        );
        render(resultado);
    }

    function setFiltro(g) {
        filtroAtual = g;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        filtrar();
    }

    // Lógica do Player e Ad
    let videoPendente = "";
    function abrir(url) {
        videoPendente = url;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('ad-area').style.display = 'block';
        document.getElementById('video').style.display = 'none';
    }

    function liberar() {
        window.open('https://www.google.com', '_blank'); // Troque pelo seu link de AdSense/Encurtador
        document.getElementById('ad-area').style.display = 'none';
        const player = document.getElementById('video');
        player.src = videoPendente;
        player.style.display = 'block';
    }

    function fechar() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('video').src = "";
    }
</script>

</body>
</html>
