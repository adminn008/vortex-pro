<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="date" class="date-display">Carregando data...</div>
    
    <div class="clock-container">
        <div id="hour" class="digit">00</div>
        <div class="separator">:</div>
        <div id="minute" class="digit">00</div>
        <div class="separator">:</div>
        <div id="second" class="digit">00</div>
    </div>

    <div id="location" class="location-display">Buscando sua cidade...</div>

    <script src="script.js"></script>
</body>
</html>
